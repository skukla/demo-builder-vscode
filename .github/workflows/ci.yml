name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # postinstall runs `npm run compile` (esbuild); tsc/eslint/jest don't need
      # the build output (jest transpiles source via swc), so skip it for speed.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
